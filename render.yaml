# =============================================================================
# Blueprint de Render — despliegue del backend en el plan gratuito.
#
# Runtime Docker con imagen python-slim, sin paquetes APT: el OCR local se
# eliminó (la CPU del plan gratuito no lo soporta), así que el build es
# rápido y el contenedor ligero. Imágenes y PDFs escaneados se procesan en
# el navegador del usuario con su propia API key de LLM.
# =============================================================================

services:
  - type: web
    name: convertidor-markdown-api
    runtime: docker
    plan: free
    region: frankfurt            # cambia a `oregon` si tu público está en América
    rootDir: backend             # el Dockerfile y el código viven en /backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /ping       # Render también hará ping interno al servicio
    autoDeploy: true
    envVars:
      # Orígenes permitidos por CORS (separados por comas, sin barra final).
      # Ajusta estos valores a las URLs reales de tu frontend.
      - key: FRONTEND_ORIGINS
        value: "https://javiiiduran.github.io,https://convertidor-markdown.vercel.app,http://localhost:4321"
      - key: PYTHON_VERSION
        value: "3.12"
